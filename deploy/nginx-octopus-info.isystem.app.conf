# Product site — octopus-info.isystem.app
# Install: sudo cp deploy/nginx-octopus-info.isystem.app.conf /etc/nginx/sites-available/octopus-info.isystem.app
#          sudo nginx -t && sudo systemctl reload nginx
#
# Web root: /var/www/octopus-info.isystem.app
# Files: index.html, octopus-consent-seo.js, sitemap.xml, sitemap.xsl, robots.txt, logo.jpg, images…

server {
    listen 80;
    listen [::]:80;
    server_name octopus-info.isystem.app;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name octopus-info.isystem.app;

    root /var/www/octopus-info.isystem.app;
    index index.html;

    access_log /var/log/nginx/octopus-info.access.log;
    error_log  /var/log/nginx/octopus-info.error.log;

    ssl_certificate     /etc/letsencrypt/live/octopus-info.isystem.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/octopus-info.isystem.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;

    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xsl {
        try_files /sitemap.xsl =404;
        default_type application/xml;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
