# OctopusApp — octopus.isystem.app
# Install: sudo cp deploy/nginx-octopus.isystem.app.conf /etc/nginx/sites-available/octopus.isystem.app
#          sudo nginx -t && sudo systemctl reload nginx
#
# Web root on VPS: /var/www/octopus
# Files: index.html, manifest.webmanifest, sw.js, icon-192.png, icon-512.png, logo.jpg, octopus-consent-seo.js, sitemap.xml, robots.txt

# HTTP -> HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name octopus.isystem.app;
    return 301 https://$host$request_uri;
}

# HTTPS — OctopusApp + PWA
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name octopus.isystem.app;

    root /var/www/octopus;
    index index.html;

    access_log /var/log/nginx/octopus.access.log;
    error_log  /var/log/nginx/octopus.error.log;

    # Let's Encrypt (certbot) — paths must match your server
    ssl_certificate     /etc/letsencrypt/live/octopus.isystem.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/octopus.isystem.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header X-Content-Type-Options "nosniff" always;

    # PWA — serve real files; never fall through to index.html
    location = /sw.js {
        try_files /sw.js =404;
        default_type application/javascript;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /manifest.webmanifest {
        try_files /manifest.webmanifest =404;
        default_type application/manifest+json;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location = /logo.jpg {
        try_files /logo.jpg =404;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /icon-192.png {
        try_files /icon-192.png =404;
        default_type image/png;
        add_header Cache-Control "public, max-age=86400";
    }

    location = /icon-512.png {
        try_files /icon-512.png =404;
        default_type image/png;
        add_header Cache-Control "public, max-age=86400";
    }

    # SEO / consent kit (if deployed)
    location = /sitemap.xml {
        try_files /sitemap.xml =404;
        default_type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /robots.txt {
        try_files /robots.txt =404;
        default_type text/plain;
        add_header Cache-Control "public, max-age=3600";
    }

    # SPA shell — all other routes -> index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate";
    }
}
